<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Movie Mood Picker</title>

</head>

<body>
    <div class="container">
        <h1>Movie Mood Picker</h1>
        <select name="select" id="mood">
            <option value="happy">Happy</option>
            <option value="sad">Sad</option>
            <option value="excited">Excited</option>
            <option value="relaxed">Relaxed</option>
            <option value="thrilled">Thrilled</option>
            <option value="chill">Chill</option>
        </select>
        <button id="pick-movie">Pick a Movie</button>
        <div id="result" class="hidden">
            <h2>Your Movie Recommendation:</h2>
            <p id="movie-title"></p>
            <p id="movie-genre"></p>
            <p id="movie-tagline"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
